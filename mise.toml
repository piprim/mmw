# mise configuration for ogl library
[settings]
experimental = true

[tools]
go = "1.26.1"
yamllint = "latest"
golangci-lint = "latest"

[shell_alias]
mr = "mise run"

[vars]
GOTESTSUM_OPTIONS = "--format testdox"

[tasks.setup]
description = "Bootstrap repo deps"
run = "go mod download"
alias = "update"

[tasks.pre-commit]
description = "Pre-commit checks (can be run manually or as git hook)"
run = "./scripts/pre-commit.sh"

[tasks.test]
description = "Run all tests with gotestsum"
run = "gotestsum {{vars.GOTESTSUM_OPTIONS}} -- -v ./..."

[tasks."test:watch"]
description = "Run tests in watch mode"
run = "gotestsum {{vars.GOTESTSUM_OPTIONS}} --watch -- -v ./..."

[tasks."test:coverage"]
description = "Run tests with coverage report"
run = "go run ./cmd/mmw/main.go test coverage"

[tasks."test:short"]
description = "Run only short tests"
run = "gotestsum {{vars.GOTESTSUM_OPTIONS}} -- -v -short ./..."

[tasks."test:verbose"]
description = "Run tests with verbose output"
run = "gotestsum --format standard-verbose -- -v ./..."

[tasks."test:json"]
description = "Run tests with JSON output"
run = "gotestsum --jsonfile test-output.json -- -v ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run ./..."

[tasks.fmt]
description = "Format Go code"
run = "gofumpt -l -w ."

[tasks."fmt:check"]
description = "Check Go code formatting"
run = "test -z $(gofumpt -l .)"

[tasks.clean]
description = "Clean test artifacts"
run = "rm -f coverage.out coverage.html test-output.json"

[tasks."doc:serve"]
description = "Start local documentation server on http://localhost:6060"
run = """
echo "Starting documentation server..."
echo "Open http://localhost:6060/pkg/github.com/ovya/ogl/ in your browser"
godoc -http=:6060
"""

[tasks.doctor]
description = "Show tool versions and key environment info"
run = "./scripts/doctor.sh"
alias = "dr"

[tasks.build]
description = "Build the mmw binary (commit/time from VCS info, version from tag)"
run = """
VERSION=$(git describe --tags --exact-match 2>/dev/null || echo "dev")
go build -ldflags "-X github.com/piprim/mmw/cmd/mmw/cmd/version.Version=${VERSION}" -o ./bin/mmw ./cmd/mmw/
echo "Built ./bin/mmw (${VERSION})"
"""

[tasks.install]
description = "Build and install mmw to $GOBIN (commit/time from VCS info, version from tag)"
run = """
VERSION=$(git describe --tags --exact-match 2>/dev/null || echo "dev")
go install -ldflags "-X github.com/piprim/mmw/cmd/mmw/cmd/version.Version=${VERSION}" ./cmd/mmw/
echo "Installed mmw (${VERSION}) → ${GOBIN}/mmw"
"""
